<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 2 - Verifikasi - KIP Kuliah 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container my-5">
        <div class="max-width-form mx-auto w-100 mb-5 text-center" style="max-width: 650px;">
            <div class="d-flex justify-content-between align-items-center position-relative indicator-wrapper">
                <div class="step-indicator complete">1<span class="ind-lbl">Data Diri</span></div>
                <div class="step-indicator active">2<span class="ind-lbl">Verifikasi</span></div>
                <div class="step-indicator">3<span class="ind-lbl">Lengkapi</span></div>
                <div class="step-indicator">4<span class="ind-lbl">Seleksi</span></div>
                <div class="step-indicator">5<span class="ind-lbl">Selesai</span></div>
            </div>
        </div>

        <div class="card p-4 shadow-sm border mx-auto text-center" style="max-width: 500px;">
            <h6 class="fw-bold mb-4 text-start text-uppercase"><i class="bi bi-shield-check me-2"></i>Verifikasi Email</h6>
            <div class="text-secondary my-4">
                <i class="bi bi-envelope-check text-primary display-4 mb-3 d-block"></i>
                <p class="small mb-1 fw-medium">Kode verifikasi telah dikirim ke email Anda.</p>
                <p class="small text-muted">Silakan cek inbox atau folder spam, lalu masukkan 4 digit kode di bawah ini.</p>
            </div>
            <form action="step3.html" method="GET">
                <div class="mb-3">
                    <label class="form-label small d-block mb-3 fw-bold">Kode Verifikasi</label>
                    <div class="d-flex justify-content-center gap-2 mb-2">
                        <input type="text" class="form-control kode-box" maxlength="1" required>
                        <input type="text" class="form-control kode-box" maxlength="1" required>
                        <input type="text" class="form-control kode-box" maxlength="1" required>
                        <input type="text" class="form-control kode-box" maxlength="1" required>
                    </div>
                    <a href="#" class="text-danger small fw-semibold d-block mt-3 text-decoration-none">Kirim ulang kode (00:45)</a>
                </div>
                <div class="d-flex justify-content-between mt-5">
                    <a href="step1.html" class="btn btn-outline-dark btn-sm px-4"><i class="bi bi-arrow-left me-1"></i> KEMBALI</a>
                    <button type="submit" class="btn btn-dark btn-sm px-4">VERIFIKASI</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
