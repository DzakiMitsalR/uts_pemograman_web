<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 4 - Pilih Seleksi - KIP Kuliah 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container my-5">
        <div class="max-width-form mx-auto w-100 mb-5 text-center" style="max-width: 650px;">
            <div class="d-flex justify-content-between align-items-center position-relative indicator-wrapper">
                <div class="step-indicator complete">1<span class="ind-lbl">Data Diri</span></div>
                <div class="step-indicator complete">2<span class="ind-lbl">Verifikasi</span></div>
                <div class="step-indicator complete">3<span class="ind-lbl">Lengkapi</span></div>
                <div class="step-indicator active">4<span class="ind-lbl">Seleksi</span></div>
                <div class="step-indicator">5<span class="ind-lbl">Selesai</span></div>
            </div>
        </div>

        <div class="card p-4 shadow-sm border mx-auto" style="max-width: 600px;">
            <h6 class="fw-bold mb-4 text-uppercase"><i class="bi bi-grid me-2"></i>Pilih Jalur Seleksi</h6>
            <form action="step5.html" method="GET">
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <div class="card p-3 h-100 selection-card position-relative border-2">
                            <div class="form-check">
                                <input class="form-check-input stretched-link" type="radio" name="jalurSeleksi" id="jalur1" required>
                                <label class="form-check-label fw-bold small text-dark d-block mb-1" for="jalur1">Jalur SNBP/SNBT</label>
                                <p class="small text-muted mb-0" style="font-size: 0.8rem;">Seleksi Nasional Berdasarkan Prestasi atau Tes.</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card p-3 h-100 selection-card position-relative border-2">
                            <div class="form-check">
                                <input class="form-check-input stretched-link" type="radio" name="jalurSeleksi" id="jalur2">
                                <label class="form-check-label fw-bold small text-dark d-block mb-1" for="jalur2">Jalur Mandiri</label>
                                <p class="small text-muted mb-0" style="font-size: 0.8rem;">Seleksi Mandiri Perguruan Tinggi (PTN/PTS).</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="d-flex justify-content-between mt-4">
                    <a href="step3.html" class="btn btn-outline-dark btn-sm px-4"><i class="bi bi-arrow-left me-1"></i> KEMBALI</a>
                    <button type="submit" class="btn btn-dark btn-sm px-4">LANJUT <i class="bi bi-arrow-right ms-1"></i></button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
