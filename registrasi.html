<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Registrasi Akun - KIP Kuliah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container my-5">
        <div class="card p-4 shadow-sm border mx-auto" style="max-width: 550px;">
            <h5 class="fw-bold border-bottom pb-2 mb-4">REGISTRASI AKUN SISWA</h5>
            <form action="step1.html" method="GET">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Nomor Induk Kependudukan (NIK):</label>
                    <input type="text" class="form-control form-control-sm" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Nomor Induk Siswa Nasional (NISN):</label>
                    <input type="text" class="form-control form-control-sm" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">Email Aktif:</label>
                    <input type="email" class="form-control form-control-sm" required>
                </div>
                <button type="submit" class="btn btn-outline-dark btn-sm w-100 fw-bold">PROSES DATA</button>
            </form>
        </div>
    </main>
</body>
</html>
